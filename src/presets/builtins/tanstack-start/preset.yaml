name: tanstack-start
description: "TanStack Start with Supabase and Drizzle essentials"
version: "1.0"
runtime: node
packageManager: npm

variables:
  project:
    type: string
    prompt: "Project name"
    default: "my-app"

steps:
  - run: npx @tanstack/cli@latest create {{project}} -y --target-dir . --force
  - install:
      deps: [drizzle-orm, pg, "@supabase/supabase-js"]
  - install:
      deps: [drizzle-kit]
      dev: true
  - file:
      path: src/lib/supabase.ts
      template: ./templates/supabase.ts.hbs
      vars:
        envAccessor: "import.meta.env"
        urlEnv: "VITE_SUPABASE_URL"
        keyEnv: "VITE_SUPABASE_ANON_KEY"
  - env:
      DATABASE_URL: "your-database-url"
      VITE_SUPABASE_URL: "your-supabase-url"
      VITE_SUPABASE_ANON_KEY: "your-supabase-anon-key"

postRun:
  - "cd {{project}}"
  - "npm run dev"
