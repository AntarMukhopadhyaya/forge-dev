name: expo
description: "Expo React Native with Supabase-ready setup"
version: "1.0"
runtime: node
packageManager: npm

variables:
  project:
    type: string
    prompt: "Project name"
    default: "my-mobile-app"

steps:
  - run: npx create-expo-app@latest . --template default@sdk-55 --yes
  - install:
      deps: ["@supabase/supabase-js"]
  - file:
      path: src/lib/supabase.ts
      template: ./templates/supabase.ts.hbs
      vars:
        envAccessor: "process.env"
        urlEnv: "EXPO_PUBLIC_SUPABASE_URL"
        keyEnv: "EXPO_PUBLIC_SUPABASE_ANON_KEY"
  - env:
      EXPO_PUBLIC_SUPABASE_URL: "your-supabase-url"
      EXPO_PUBLIC_SUPABASE_ANON_KEY: "your-supabase-anon-key"

postRun:
  - "cd {{project}}"
  - "npm run start"
