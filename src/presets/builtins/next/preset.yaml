name: next-app
description: "Next.js with Tailwind and Auth"
version: "1.0"
runtime: node
packageManager: npm

variables:
  project:
    type: string
    prompt: "Project name"
    default: "my-app"
  databaseUrl:
    type: string
    prompt: "Database URL"
  database:
    type: choice
    options: ["postgres", "sqlite"]
    default: "postgres"
    prompt: "Which database to use?"

steps:
  - run: npx create-next-app@latest . --ts --tailwind --eslint --app --src-dir --import-alias @/* --yes
  - install:
      deps: [drizzle-orm, better-auth]
  - install:
      deps: [pg]
    if:
      database: postgres
  - install:
      deps: [better-sqlite3]
    if:
      database: sqlite
  - install:
      deps: [drizzle-kit]
      dev: true
  - file:
      path: src/lib/db.ts
      template: ./templates/db.ts.hbs
      vars:
        type: "{{database}}"
  - env:
      DATABASE_URL: "{{databaseUrl}}"

postRun:
  - "cd {{project}}"
  - "echo 'Remember to set up your DATABASE_URL environment variable before running the app!'"
  - "npm run dev"
